server:
  port: 8000

metrics:
  cusum:
    k: 0.05
    h: 0.1
    mean: 0.82
    variance: 0.01

  ewma:
    lambda: 0.2
    std_dev: 0.08
    mean: 0.82
    threshold: 1.5

target:
  url: ""
  method: "POST"

request:
  headers:
    Authorization: "Bearer ${API_KEY}"
  body:
    message: "{{query}}"
    session_id: "123"

response:
  path: "$.origin"

baseline:
  model: "gemini-embedding-2"
  threshold: 0.75
  store: "./baseline_embedding.json"

cache:
  size: 30
